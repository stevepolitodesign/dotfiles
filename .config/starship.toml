"$schema" = 'https://starship.rs/config-schema.json'

# The default git_status ahead/behind/deleted markers use plain Unicode symbols
# (έΘκ έΘμ έεα) that aren't in Hack Nerd Font, so the terminal renders them
# with a mismatched fallback font (or tofu έΑΦ έεα is missing entirely). These use
# Nerd Font private-use glyphs, which render from Hack Nerd Font like the branch icon.
[git_status]
ahead = "ΎΒλ"
behind = "ΎΒμ"
diverged = "ΎΒλΎΒμ"
deleted = "ΎΡκ"
stashed = "ΌχΔ ${count}"
